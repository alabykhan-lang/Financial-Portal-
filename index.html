<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Portal — Way to Success</title>
    <!-- External Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- React & Dependencies from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Professional CSS System */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --navy:#0d1b2a;--navy2:#1b2d40;--navy3:#243d55;--navy4:#2e4d6b;
            --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e4a8;--goldbg:#fdf8ec;
            --slate:#4a5568;--slate3:#a0aec0;
            --bg:#f7f8fa;--bg2:#eef0f4;--card:#ffffff;
            --ink:#1a202c;--ink2:#2d3748;--muted:#718096;
            --border:#e2e8f0;--border2:#edf2f7;
            --green:#1a7f4b;--greenbg:#e6f7ef;--greenbdr:#b2dfcc;
            --red:#c0392b;--redbg:#fef0ee;--redbdr:#f5c6c0;
            --blue:#2563eb;--bluebg:#eff6ff;
            --amber:#d97706;--amberbg:#fffbeb;
            --ff-d:'Playfair Display',Georgia,serif;
            --ff-b:'Inter','Segoe UI',sans-serif;
            --ff-m:'JetBrains Mono',Consolas,monospace;
            --sh:0 1px 3px rgba(13,27,42,.06),0 1px 2px rgba(13,27,42,.04);
            --sh3:0 20px 60px rgba(13,27,42,.15);
            --r:8px;--r2:12px;
            --sw:245px;
        }
        html{font-size:16px;scroll-behavior:smooth}
        body{font-family:var(--ff-b);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
        input,select,textarea,button{font-family:inherit;font-size:inherit}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:var(--bg2)}
        ::-webkit-scrollbar-thumb{background:var(--slate3);border-radius:3px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
        @media print{body *{visibility:hidden!important}.print-receipt,.print-receipt *{visibility:visible!important}.print-receipt{position:fixed!important;top:0!important;left:0!important;width:100%!important;background:#fff!important;z-index:99999!important;padding:24px!important}.np{display:none!important}}
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
        .sect{font-family:var(--ff-d);font-size:1.1rem;color:var(--ink);margin-bottom:14px;font-weight:600}
        .gf2{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
        .fr{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
        .fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .fl{display:flex;flex-direction:column;gap:4px}
        .flb{font-size:.75rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.7px}
        .inp{padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;background:#fff;color:var(--ink);outline:none;width:100%;transition:border-color .2s;font-size:.93rem}
        .inp:focus{border-color:var(--navy3);box-shadow:0 0 0 3px rgba(36,61,85,.08)}
        .sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;background:#fff;color:var(--ink);outline:none;cursor:pointer;width:100%;font-size:.93rem}
        .btn{font-weight:600;padding:9px 20px;border:none;border-radius:6px;cursor:pointer;transition:all .15s;font-size:.88rem;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
        .btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy2)}
        .btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold2)}
        .btn-green{background:var(--green);color:#fff}
        .btn-red{background:var(--red);color:#fff}
        .btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
        .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
        .btn-sm{padding:6px 14px;font-size:.78rem}
        .btn-xs{padding:4px 10px;font-size:.74rem}
        .msg-ok{background:var(--greenbg);border:1px solid var(--greenbdr);color:var(--green);padding:11px 14px;border-radius:6px;font-size:.86rem;margin-bottom:12px;animation:slideDown .25s ease}
        .msg-err{background:var(--redbg);border:1px solid var(--redbdr);color:var(--red);padding:11px 14px;border-radius:6px;font-size:.86rem;margin-bottom:12px}
        .badge{font-family:var(--ff-m);font-size:.66rem;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:.3px}
        .bdg{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
        .bdr{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr)}
        .bdo{background:var(--amberbg);color:var(--amber);border:1px solid #fbbf24}
        .bdb{background:var(--bluebg);color:var(--blue);border:1px solid #93c5fd}
        .tw{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);margin-top:8px}
        table{width:100%;border-collapse:collapse;font-size:.88rem}
        th{text-align:left;padding:11px 12px;background:var(--navy);color:#fff;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
        td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--ink2)}
        .kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:16px}
        .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
        .kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent,var(--navy))}
        .kl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
        .kv{font-family:var(--ff-m);font-size:1.3rem;font-weight:700;color:var(--ink);margin-top:6px}
        .pill{font-size:.78rem;padding:5px 13px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;background:var(--card);color:var(--muted)}
        .pill.a{background:var(--navy);border-color:var(--navy);color:#fff}
        .sb{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--navy);z-index:200;display:flex;flex-direction:column}
        .pm{flex:1;margin-left:var(--sw);min-width:0;display:flex;flex-direction:column}
        .ptb{background:var(--navy);height:54px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100}
        .ptitle{font-family:var(--ff-d);font-size:.96rem;color:#fff;font-weight:600;flex:1}
        .pc{padding:18px;max-width:1100px;margin:0 auto;width:100%}
        @media(max-width:768px){
            .sb{display:none}
            .pm{margin-left:0}
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef } = React;

        // Constants & Config
        const SB = "https://qbjtiximcchhnxhttogq.supabase.co";
        const SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFianRpeGltY2NoaG54aHR0b2dxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTg1MDM5NCwiZXhwIjoyMDkxNDI2Mzk0fQ.485SXyI0Lvcr7eTtXA2Derlap8n2OTnqItZ0w15IJbM";
        const SH = { "apikey": SK, "Authorization": "Bearer " + SK, "Content-Type": "application/json", "Prefer": "return=representation" };
        const SEC_A = ["Crèche", "KG1", "KG2", "Nursery 1", "Nursery 2", "Primary 1"];
        const SEC_B = ["Primary 2", "Primary 3", "Primary 4", "Primary 5", "JSS1", "JSS2", "JSS3", "SS1", "SS2", "SS3"];
        const ALL_CLS = [...SEC_A, ...SEC_B];
        const DEF_CATS = ["Tuition Fee", "Exam Fee", "Report Card Fee", "End of Year Party Fee", "Sports Fee", "Sports Wears", "Outstanding/Backlog"];
        const SCHOOL_SHORT = "Way to Success Standard School";
        const SUPER_PASS = "7878";

        // Helpers
        const LS = {
            s: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
            g: (k, d) => { const r = localStorage.getItem(k); return r ? JSON.parse(r) : d; }
        };
        const N = (v) => new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(v || 0);
        const today = () => new Date().toISOString().split('T')[0];
        const uid = () => Math.random().toString(36).substr(2, 9);
        const fmtD = (d) => d ? new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '';

        // API
        const api = {
            g: async (t, q = "") => { const r = await fetch(`${SB}/rest/v1/${t}?${q}`, { headers: SH }); return r.json(); },
            u: async (t, d) => { const r = await fetch(`${SB}/rest/v1/${t}`, { method: "POST", headers: { ...SH, "Prefer": "resolution=merge-duplicates" }, body: JSON.stringify(d) }); const text = await r.text(); return text ? JSON.parse(text) : d; },
            pa: async (t, q, d) => { const r = await fetch(`${SB}/rest/v1/${t}?${q}`, { method: "PATCH", headers: SH, body: JSON.stringify(d) }); return r.json(); },
            d: async (t, q) => { await fetch(`${SB}/rest/v1/${t}?${q}`, { method: "DELETE", headers: SH }); }
        };

        // Context
        const AppCtx = createContext();
        const Prov = ({ children }) => {
            const [session, setSession] = useState(LS.g('ssfp_session', null));
            const [students, setStudents] = useState({});
            const [cashBook, setCashBook] = useState([]);
            const [categories, setCategories] = useState(DEF_CATS);
            const [dbOk, setDbOk] = useState(null);
            const [syncMsg, setSyncMsg] = useState('Initializing...');

            useEffect(() => { LS.s('ssfp_session', session); }, [session]);

            const init = async () => {
                setSyncMsg('Connecting to cloud...');
                try {
                    const [stu, cb, cats] = await Promise.all([
                        api.g('students', 'order=name.asc'),
                        api.g('ssfp_cashbook', 'order=timestamp.asc'),
                        api.g('ssfp_categories', 'order=id.asc')
                    ]);
                    const sm = {};
                    stu.forEach(s => { const k = s.class_key; if (!sm[k]) sm[k] = []; sm[k].push({ ...s, supaId: s.id, payments: cb.filter(e => e.student === s.name && !e.reversed) }); });
                    setStudents(sm);
                    setCashBook(cb);
                    if (cats.length) setCategories(cats.map(c => c.name));
                    setDbOk(true);
                    setSyncMsg('Cloud Active');
                } catch (e) {
                    setDbOk(true);
                    setSyncMsg('Offline Mode');
                }
            };

            useEffect(() => { init(); }, []);

            const wipeEntries = async () => {
                if (!confirm("Clear all Cash Book entries?")) return;
                setSyncMsg('Wiping...');
                await api.d('ssfp_cashbook', 'entry_id=neq.0');
                setCashBook([]);
                setSyncMsg('Cash Book Wiped');
            };

            return (
                <AppCtx.Provider value={{ session, setSession, students, setStudents, cashBook, setCashBook, categories, setCategories, dbOk, syncMsg, wipeEntries }}>
                    {children}
                </AppCtx.Provider>
            );
        };

        // Components
        const AuthGate = () => {
            const { setSession } = useContext(AppCtx);
            const [pin, setPin] = useState('');
            const login = () => {
                if (pin === '1234') setSession({ name: 'Administrator', role: 'admin', section: 'both' });
                else alert('Invalid PIN');
            };
            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--navy)' }}>
                    <div className="card" style={{ width: 320, textAlign: 'center' }}>
                        <h2 className="sect">Finance Portal</h2>
                        <input type="password" value={pin} onChange={e => setPin(e.target.value)} className="inp" placeholder="Enter PIN" style={{ textAlign: 'center', fontSize: '1.2rem' }} />
                        <button onClick={login} className="btn btn-gold" style={{ width: '100%', marginTop: 14 }}>LOGIN</button>
                    </div>
                </div>
            );
        };

        const Portal = () => {
            const { session, setSession, syncMsg, wipeEntries } = useContext(AppCtx);
            const [tab, setTab] = useState('home');

            const handleWipe = () => {
                const p = prompt("Enter Super Admin Password to wipe Cash Book:");
                if (p === SUPER_PASS) wipeEntries();
            };

            return (
                <div style={{ display: 'flex' }}>
                    <aside className="sb">
                        <div style={{ padding: 20, color: '#fff' }}>
                            <div style={{ fontWeight: 800, fontSize: '1.2rem', color: 'var(--gold)' }}>WTS</div>
                            <div style={{ fontSize: '.7rem', opacity: .5 }}>{SCHOOL_SHORT}</div>
                        </div>
                        <nav style={{ flex: 1, padding: '0 10px' }}>
                            <div onClick={() => setTab('home')} className={`pill ${tab === 'home' ? 'a' : ''}`} style={{ marginBottom: 8, borderRadius: 6 }}>🏠 Home</div>
                            <div onClick={() => setTab('cash')} className={`pill ${tab === 'cash' ? 'a' : ''}`} style={{ marginBottom: 8, borderRadius: 6 }}>📒 Cash Book</div>
                        </nav>
                        <div style={{ padding: 20 }}>
                            <button onClick={handleWipe} className="btn btn-red btn-xs" style={{ width: '100%', marginBottom: 10 }}>Wipe Cash Book</button>
                            <button onClick={() => setSession(null)} className="btn btn-ghost btn-sm" style={{ width: '100%', color: '#fff' }}>Logout</button>
                        </div>
                    </aside>
                    <main className="pm">
                        <header className="ptb">
                            <div className="ptitle">Financial Portal — {tab.toUpperCase()}</div>
                            <div style={{ color: 'var(--gold)', fontSize: '.75rem', fontWeight: 700 }}>{syncMsg}</div>
                        </header>
                        <div className="pc">
                            {tab === 'home' ? (
                                <div className="fu">
                                    <div className="card" style={{ background: 'linear-gradient(135deg, var(--navy), var(--navy3))', color: '#fff' }}>
                                        <h2 style={{ fontFamily: 'var(--ff-d)' }}>Welcome, {session.name}</h2>
                                        <p style={{ opacity: .7, fontSize: '.8rem' }}>System is live and synchronized.</p>
                                    </div>
                                    <div className="kg">
                                        <div className="kpi"><div className="kl">Status</div><div className="kv" style={{ color: 'var(--green)' }}>Operational</div></div>
                                        <div className="kpi"><div className="kl">Session</div><div className="kv">2024/2025</div></div>
                                    </div>
                                </div>
                            ) : (
                                <div className="fu">
                                    <div className="fb" style={{ marginBottom: 14 }}>
                                        <h2 className="sect">Daily Cash Book</h2>
                                    </div>
                                    <div className="tw">
                                        <table>
                                            <thead><tr><th>Date</th><th>Student</th><th>Category</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
                                            <tbody>
                                                <tr><td colSpan="4" className="er">Cash book entries will appear here.</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const { session, dbOk } = useContext(AppCtx);
            if (dbOk === null) return <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--navy)', color: '#fff' }}>Loading Portal...</div>;
            return session ? <Portal /> : <AuthGate />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Prov><App /></Prov>);
    </script>
</body>
</html>
