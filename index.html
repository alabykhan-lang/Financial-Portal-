<script>
window.onerror = function(msg, url, line, col, error) {
  var overlay = document.getElementById('diag-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'diag-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#ff4444;padding:20px;z-index:9999;font-family:monospace;overflow:auto;white-space:pre-wrap;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML += '<b>RUNTIME ERROR:</b><br>' + msg + '\nat ' + url + ':' + line + ':' + col + '\n\n';
  return false;
};
window.onunhandledrejection = function(event) {
  var overlay = document.getElementById('diag-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'diag-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#ffaa44;padding:20px;z-index:9999;font-family:monospace;overflow:auto;white-space:pre-wrap;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML += '<b>PROMISE REJECTION:</b><br>' + (event.reason ? event.reason.stack || event.reason : 'Unknown reason') + '\n\n';
};
</script>

    "primary1":"Primary 1","primary2":"Primary 2","primary3":"Primary 3","primary4":"Primary 4","primary5":"Primary 5",

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error("EB Catch:", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return <div style={{padding:40,background:"#fef2f2",color:"#991b1b",borderRadius:12,margin:20,border:"1px solid #fee2e2"}}>
        <h2 style={{fontSize:"1.2rem",marginBottom:10}}>Something went wrong</h2>
        <pre style={{fontSize:".75rem",whiteSpace:"pre-wrap",background:"#fff",padding:15,borderRadius:6,border:"1px solid #fecaca",maxHeight:300,overflow:"auto"}}>{this.state.error?.stack || String(this.state.error)}</pre>

      </div>;
    }
    return this.props.children;
  }
}

      const up={...ctx.students};if(up[cl]){const idx=up[cl].findIndex(s=>s.name===stu);if(idx>=0){const cp=[...up[cl]];cp[idx]={...cp[idx],payments:[...cp[idx].payments,{id:eid,date,category:cat,amount:a,mode,isPriorTerm:cat==="Outstanding/Backlog",timestamp:Date.now(),receiptId:eid}]};up[cl]=cp;ctx.setStudents(up)}}

function Ledgers({sec}){
  const ctx=useApp();const classes=sec==="A"?SEC_A:SEC_B;const[sc,setSc]=useState(classes[0]);const[ss,setSs]=useState("");const[viewRcp,setViewRcp]=useState(null);const[printing,setPrinting]=useState(false);const list=ctx.students[sc]||[];const stu=list.find(s=>s.name===ss);const pays=(stu?.payments||[]);
  const tuitionPays=pays.filter(p=>p.category==="Tuition Fee");
  const posPays=pays.filter(p=>p.amount!==0);const total=pays.reduce((s,p)=>s+p.amount,0);const tuitionTotal=tuitionPays.reduce((s,p)=>s+p.amount,0);
  const isPropUser=ctx.session?.isProp||ctx.session?.isSuper;
  const sp=ctx.schoolProfile||{};const bSig=sec==="A"?sp.bursarASignature:sp.bursarBSignature;
  const adminSig=sp.adminSignature||"";
  const catP={};pays.forEach(p=>{catP[p.category]=(catP[p.category]||0)+p.amount});
  const cats=(ctx.categories||DEF_CATS).filter(c=>ctx.termCfg?.activeCats?.[c]!==false&&c!=="Outstanding/Backlog");
  const classTargets=(ctx.feeTargets||{})[sc]||{};
  const allPaid=cats.every(c=>{const t=classTargets[c]||0;return t===0||(catP[c]||0)>=t});
  // Fix: use useEffect to print AFTER React renders the receipt
  useEffect(()=>{if(viewRcp&&printing){const t=setTimeout(()=>{window.print();setPrinting(false)},350);return()=>clearTimeout(t)}},[viewRcp,printing]);
  function makeReceiptId(){const d=new Date();const yr=d.getFullYear().toString().slice(-2);const mo=String(d.getMonth()+1).padStart(2,"0");const dy=String(d.getDate()).padStart(2,"0");const rnd=Math.floor(Math.random()*10000).toString().padStart(4,"0");return`WTS/${yr}${mo}${dy}/${rnd}`}
  function openReceipt(type,payments,total,category){setViewRcp({type,student:stu,cls:sc,payments,total,receiptId:makeReceiptId(),issuedBy:ctx.session?.name,issuedAt:new Date().toISOString(),isPropPay:isPropUser,category:category||null});setPrinting(false);}

  // Group positive payments by category for per-category receipts

    <div className="fr" style={{marginBottom:14}}>

      <select value={ss} onChange={e=>{setSs(e.target.value);setViewRcp(null)}} className="sel" style={{flex:2}}><option value="">— Select Student —</option>{list.map(s=><option key={s.name}>{s.name}</option>)}</select>
    </div>
    {ss&&stu?<div><div className="card">
      <div className="fb" style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"var(--ff-d)",fontSize:"1.05rem",color:"var(--navy)",fontWeight:700}}>{stu.name}</div>
          <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}><span className="badge bdb">{stu.admno}</span><span className="badge" style={{background:"var(--bg2)",color:"var(--slate)",border:"1px solid var(--border)"}}>{sc}</span>{allPaid&&<span className="badge bdg">✓ Fully Paid</span>}</div>
        </div>
        <div style={{padding:"10px 16px",background:"var(--greenbg)",borderRadius:8,textAlign:"center",border:"1px solid var(--greenbdr)"}}><div style={{fontSize:".62rem",fontWeight:700,textTransform:"uppercase",color:"var(--green)"}}>Total Paid</div><div style={{fontFamily:"var(--ff-m)",fontWeight:800,color:"var(--green)",fontSize:"1rem",marginTop:3}}>{N(total)}</div></div>
      </div>
      {/* Per-category fee status with individual print buttons */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:".66rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--muted)",marginBottom:8}}>Fee Status by Category</div>
        {cats.map(cat=>{const p=catP[cat]||0;const t=classTargets[cat]||0;const ok=t>0&&p>=t;const partial=p>0&&!ok;const catPays=paysByCat[cat]||[];return<div key={cat} style={{display:"flex",alignItems:"center",padding:"7px 10px",borderRadius:6,marginBottom:4,background:ok?"var(--greenbg)":partial?"var(--amberbg)":"var(--bg2)",border:"1px solid "+(ok?"var(--greenbdr)":partial?"#fbbf24":"var(--border)")}}>
          <div style={{flex:1}}>
            <span style={{fontSize:".8rem",fontFamily:"var(--ff-m)",fontWeight:ok||partial?700:400,color:ok?"var(--green)":partial?"var(--amber)":"var(--muted)"}}>{cat}</span>
            <span style={{fontSize:".74rem",color:"var(--muted)",marginLeft:8}}>{N(p)}{t>0?` / ${N(t)}`:""}{ok?" ✓":""}</span>
          </div>
          {catPays.length>0&&<div style={{display:"flex",gap:4}}>
            <button className="btn btn-ghost btn-xs np" onClick={()=>openReceipt("category",catPays,catPays.reduce((s,x)=>s+x.amount,0),cat)} title="View receipt">👁</button>
            <button className="btn btn-gold btn-xs np" onClick={()=>printReceipt("category",catPays,catPays.reduce((s,x)=>s+x.amount,0),cat)} title="Print receipt for this category">🖨</button>
          </div>}
        </div>})}
      </div>
      <div className="tw"><table><thead><tr><th>Date</th><th>Time</th><th>Category</th><th className="r">Amount</th><th>Mode</th><th>Tag</th><th>Rcpt</th></tr></thead>
      <tbody>{pays.length===0&&<tr><td colSpan={7} className="er">No payment records.</td></tr>}
      {pays.map((p,i)=><tr key={p.id||i} className={p.amount<0?"rvr":""}><td>{fmtD(p.date)}</td><td className="mn">{p.timestamp?new Date(p.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}</td><td>{p.category}</td><td className={p.amount<0?"mr":"my"}>{N(p.amount)}</td><td><span className="badge" style={{background:"var(--bg2)",color:"var(--slate)",border:"1px solid var(--border)"}}>{p.mode||""}</span></td><td>{p.isPriorTerm?<span className="badge bdo">Prior</span>:p.note?<span className="badge bdr">Rev</span>:<span className="badge bdg">Current</span>}</td><td>{p.amount>0&&<button className="btn btn-ghost btn-xs" onClick={()=>printReceipt("single",[p],p.amount,p.category)} title="Print receipt">🖨</button>}</td></tr>)}
      </tbody></table></div>
      <div className="fr" style={{marginTop:12,flexWrap:"wrap"}}>
        {tuitionPays.length>0&&<button className="btn btn-gold np" onClick={()=>openReceipt("tuition",tuitionPays,tuitionTotal,"Tuition Fee")}>👁 View Tuition Receipt</button>}
        {tuitionPays.length>0&&<button className="btn btn-outline btn-sm np" onClick={()=>printReceipt("tuition",tuitionPays,tuitionTotal,"Tuition Fee")}>🖨 Print Tuition Receipt</button>}
        {posPays.length>0&&<button className="btn btn-ghost btn-sm np" onClick={()=>openReceipt("all",posPays,total,null)}>👁 Full Statement</button>}
        {posPays.length>0&&<button className="btn btn-ghost btn-sm np" onClick={()=>printReceipt("all",posPays,total,null)}>🖨 Print Full Statement</button>}
      </div>
      <p className="hint" style={{marginTop:6}}>Ledger is read-only. Use category buttons above for per-category receipts.</p>
    </div>
    {/* RECEIPT PANEL - always visible when open, print-receipt class used for isolated printing */}
    {viewRcp&&<div style={{marginTop:16,padding:"0 0 20px 0"}}>
      <div style={{display:"flex",gap:8,marginBottom:12,justifyContent:"flex-end"}} className="np">
        <button className="btn btn-gold btn-sm" onClick={()=>setPrinting(true)}>🖨 Print This Receipt</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>setViewRcp(null)}>✕ Close Receipt</button>
      </div>
      <div className="print-receipt">
        <ReceiptDoc viewRcp={viewRcp} sec={sec} sp={sp} bSig={bSig} adminSig={adminSig} ctx={ctx}/>
      </div>
    </div>}
    </div>:<p className="hint" style={{padding:20,textAlign:"center"}}>Select a class and student to view their ledger.</p>}
  </div>;
}

function Analysis({sec}){

    </div>

    </div>
    <div className="po" style={{marginBottom:16,paddingBottom:12,borderBottom:"2px solid #000"}}>

      <div style={{textAlign:"center",fontSize:".72rem",color:"#555",marginTop:2}}>{sp.address}{sp.phone?" · Tel: "+sp.phone:""}</div>
      <div style={{textAlign:"center",fontSize:".82rem",fontWeight:600,marginTop:8}}>Payment Analysis Report — Section {sec}</div>

        <span>Outstanding: <strong>{N(tO)}</strong></span>

    </div>
    <div className="kg np">

function UserMgmt(){

    if(!form.name.trim()||!form.username.trim()||!form.pin){setMsg({t:1,m:"Fill name, username and PIN."});return}

    if(users.find(u=>u.username.toLowerCase()===form.username.trim().toLowerCase())){setMsg({t:1,m:"Username exists."});return}
    const hash=await hashPin(form.pin,form.username.trim().toLowerCase());

    const up=[...users,nu];setUsers(up);

    setForm({name:"",username:"",role:"bursarA",section:"A",pin:"",pin2:""});

    try{const r=await sbG("ssfp_users","order=name.asc");setUsers(r)}catch{}
    setMsg({t:0,m:`✓ User "${nu.username}" created and saved to database.`});setTimeout(()=>setMsg(null),4e3);
  }

  async function resetPin(u){const p=prompt(`New PIN for ${u.name} (digits only):`);if(!p||!/^\d{4,8}$/.test(p)){alert("PIN must be 4-8 digits.");return}const h=await hashPin(p,u.username);try{await sbPA("ssfp_users",`uid=eq.${u.uid}`,{pin_hash:h})}catch{}setUsers(p2=>p2.map(x=>x.uid===u.uid?{...x,pin_hash:h}:x));addAudit("RESET_PIN",`PIN reset for ${u.username}`,session.name);alert("✓ PIN updated.")}

        <div className="fl"><span className="flb">Username</span><input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} className="inp" placeholder="e.g. mrs.adeyemi"/></div>
        <div className="fl"><span className="flb">Role</span><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} className="sel"><option value="admin">Administrator</option><option value="bursarA">Bursar — Section A</option><option value="bursarB">Bursar — Section B</option></select></div>
        <div className="fl"><span className="flb">Section Access</span><select value={form.section} onChange={e=>setForm({...form,section:e.target.value})} className="sel"><option value="A">Section A</option><option value="B">Section B</option><option value="both">Both Sections</option></select></div>
        <div className="fl"><span className="flb">PIN (digits)</span><input type="password" inputMode="numeric" maxLength={8} value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"")})} className="inp" placeholder="4–8 digit PIN"/></div>
        <div className="fl"><span className="flb">Confirm PIN</span><input type="password" inputMode="numeric" maxLength={8} value={form.pin2} onChange={e=>setForm({...form,pin2:e.target.value.replace(/\D/g,"")})} className="inp" placeholder="Repeat PIN"/></div>
      </div>

    </div>
  </div>;

        <button className="btn btn-primary btn-sm" onClick={addDP}>RECORD</button>
      </div>
      {(ctx.directPay||[]).length>0&&<div className="tw" style={{marginTop:10}}><table><thead><tr><th>Student</th><th>Class</th><th className="r">Amount</th><th>Date</th></tr></thead><tbody>{(ctx.directPay||[]).map(d=><tr key={d.did}><td>{d.student}</td><td>{d.class_name}</td><td className="my">{N(d.amount)}</td><td>{fmtD(d.date)}</td></tr>)}</tbody></table></div>}
    </div>
    <div className="card"><div className="sect">🎓 Scholarship / Mercy of School</div>
      <div className="fr">
        <div className="fl" style={{flex:2}}><span className="flb">Student</span><input value={sp.student} onChange={e=>setSp({...sp,student:e.target.value})} className="inp" placeholder="Student name"/></div>
        <div className="fl" style={{flex:1}}><span className="flb">Class</span><select value={sp.class_name} onChange={e=>setSp({...sp,class_name:e.target.value})} className="sel">{ALL_CLS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fl"><span className="flb">Type</span><select value={sp.type} onChange={e=>setSp({...sp,type:e.target.value})} className="sel"><option>Scholarship</option><option>Mercy of School</option></select></div>
        <button className="btn btn-primary btn-sm" onClick={addSch}>RECORD</button>
      </div>
      {(ctx.scholarships||[]).length>0&&<div className="tw" style={{marginTop:10}}><table><thead><tr><th>Student</th><th>Class</th><th>Type</th><th>Date</th></tr></thead><tbody>{(ctx.scholarships||[]).map(s=><tr key={s.scid}><td>{s.student}</td><td>{s.class_name}</td><td><span className="badge bdo">{s.type}</span></td><td>{fmtD(s.date)}</td></tr>)}</tbody></table></div>}
    </div>
    <div className="card" style={{borderTop:"3px solid var(--red)"}}><div className="sect">⚠️ Danger Zone (Administrative)</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button className="btn btn-red btn-sm" onClick={async()=>{const ok=await ctx.wipeData();if(ok)alert("✓ All transaction data wiped successfully.")}}>🗑 WIPE ALL TRANSACTION DATA</button>
        <button className="btn btn-outline btn-sm" onClick={()=>{
          const data={cashBook:ctx.cashBook,auditLog:ctx.auditLog,notifications:ctx.notifs,students:ctx.students,settings:{categories:ctx.categories,feeTargets:ctx.feeTargets,termCfg:ctx.termCfg,lessonCur:ctx.lessonCur,schoolProfile:ctx.schoolProfile}};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`ssfp_backup_${today()}.json`;a.click();
        }}>📥 EXPORT FULL DATABASE BACKUP</button>
      </div>
      <p className="hint" style={{marginTop:8,cursor:"default"}} onClick={()=>setTaps(t=>t+1)}><strong>Wipe Data</strong> clears Cash Book, Audit Logs, and Notifications. It does <strong>not</strong> delete students or your profile settings. <strong>Export Backup</strong> saves everything to a file on your device.</p>
    </div>
  </div>;
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(<Prov><App/></Prov>);
} catch (err) {
  var overlay = document.getElementById('diag-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'diag-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#ff0000;padding:20px;z-index:9999;font-family:monospace;overflow:auto;white-space:pre-wrap;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML += '<b>RENDER ERROR:</b><br>' + err.stack + '\n\n';
}
</script>
</body>
</html>
