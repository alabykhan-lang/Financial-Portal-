<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSFP — Sovereign School Finance Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Libre+Franklin:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1eb;--bg2:#eae5da;--card:#fffef9;--card2:#faf8f2;
  --ink:#1a1610;--ink2:#3d362a;--muted:#8a7e6d;--muted2:#b5aa96;
  --border:#d6cebb;--border2:#e8e1d2;
  --accent:#6b4c2a;--accent2:#8b6d45;--accent3:#a4874f;
  --green:#2d6a3f;--green2:#e6f2ea;--greenBg:#dcf0e2;
  --red:#9b2c2c;--red2:#fde8e8;--redBg:#fce4e4;
  --blue:#2b5ea7;--blue2:#e8f0fa;
  --gold:#c5981a;--gold2:#fdf6e3;
  --header:#1a1610;--headerText:#f4f1eb;
  --navBg:#2a2318;
  --ff-d:'DM Serif Display',Georgia,serif;
  --ff-b:'Libre Franklin','Segoe UI',sans-serif;
  --ff-m:'JetBrains Mono',Consolas,monospace;
  --sh:0 1px 3px rgba(26,22,16,.08);
  --sh2:0 4px 16px rgba(26,22,16,.1);
  --r:6px;
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--ff-b);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.fi{animation:fadeIn .35s ease-out both}
.fd1{animation-delay:.05s}.fd2{animation-delay:.1s}.fd3{animation-delay:.15s}
.shake{animation:shake .4s ease}
@media print{body{background:#fff!important}.np{display:none!important}.po{display:block!important}.rp{break-inside:avoid}}.po{display:none}
/* Layout */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.ct{font-family:var(--ff-d);font-size:1.1rem;color:var(--ink);margin-bottom:12px}
.gf{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.fr{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
/* Fields */
.fl{display:flex;flex-direction:column;gap:3px}
.flb{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.inp{padding:7px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--ink);outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inpm{font-family:var(--ff-m);padding:7px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--ink);outline:none}
.sel{padding:7px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--ink);outline:none;cursor:pointer;width:100%}
/* Buttons */
.btn{font-weight:700;padding:8px 20px;border:none;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;font-size:.78rem;letter-spacing:.3px;white-space:nowrap}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}
.bg2{background:var(--green);color:#fff}.bg2:hover{opacity:.9}
.br{background:var(--red);color:#fff}.br:hover{opacity:.9}
.bo{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}.bo:hover{background:var(--accent);color:#fff}
.bgh{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 14px;font-weight:500}.bgh:hover{background:var(--bg2)}
.bs{padding:5px 12px;font-size:.7rem}
/* Messages */
.mo{background:var(--green2);border:1px solid #a5d6a7;color:var(--green);padding:9px 14px;border-radius:4px;font-size:.83rem;margin-bottom:10px;animation:slideDown .3s ease}
.me{background:var(--red2);border:1px solid #e8aaaa;color:var(--red);padding:9px 14px;border-radius:4px;font-size:.83rem;margin-bottom:10px;animation:slideDown .3s ease}
.mw{background:var(--gold2);border:1px solid #e0c97a;color:#7a6a20;padding:9px 14px;border-radius:4px;font-size:.83rem;margin-bottom:10px}
/* Badges */
.badge{font-family:var(--ff-m);font-size:.63rem;padding:2px 8px;border-radius:3px;font-weight:600}
.bdg{background:var(--greenBg);color:var(--green)}
.bdr{background:var(--redBg);color:var(--red)}
.bdo{background:var(--gold2);color:#7a6a20}
.bdb{background:var(--blue2);color:var(--blue)}
.hint{font-size:.76rem;color:var(--muted);font-style:italic;margin-top:4px}
/* Tables */
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:4px;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:8px 10px;background:var(--header);color:var(--headerText);font-weight:600;font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:1}
th.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid var(--border2);color:var(--ink2)}
td.mn{font-family:var(--ff-m);font-size:.72rem;color:var(--muted)}
td.my{font-family:var(--ff-m);font-size:.8rem;text-align:right;font-weight:600;color:var(--green)}
td.mr{font-family:var(--ff-m);font-size:.8rem;text-align:right;font-weight:600;color:var(--red)}
tr:hover td{background:var(--bg2)}
tr.rvd td{text-decoration:line-through;opacity:.5;background:var(--red2)}
tr.rvr td{background:#fff8f0}
.er{padding:22px;text-align:center;color:var(--muted);font-style:italic;font-size:.8rem}
/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kl{font-size:.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kv{font-family:var(--ff-m);font-size:1.3rem;font-weight:700;color:var(--ink);margin-top:4px}
/* Pills */
.cp{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pill{font-size:.73rem;padding:4px 11px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s;font-weight:500}
.pill.a{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
/* Toggle */
.ton{font-family:var(--ff-m);font-size:.66rem;font-weight:700;padding:3px 11px;background:var(--green);color:#fff;border:none;border-radius:3px;cursor:pointer}
.tof{font-family:var(--ff-m);font-size:.66rem;font-weight:700;padding:3px 11px;background:#bbb;color:#fff;border:none;border-radius:3px;cursor:pointer}
/* Lesson grid */
.lg{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.lc{background:var(--card);padding:7px;text-align:center;font-family:var(--ff-m);font-size:.78rem}
.lh{background:var(--header);color:var(--headerText);font-weight:600;font-size:.64rem;text-transform:uppercase;padding:7px;text-align:center}
.lt{background:var(--gold2);font-weight:700}
.li{width:100%;text-align:center;border:1px solid var(--border);border-radius:3px;padding:4px 2px;font-family:var(--ff-m);font-size:.76rem;background:#fff;outline:none}
/* Bar chart */
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-l{font-size:.73rem;color:var(--ink2);width:120px;text-align:right;flex-shrink:0}
.bar-t{flex:1;height:16px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bar-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px;transition:width .5s}
.bar-v{font-family:var(--ff-m);font-size:.7rem;color:var(--muted);width:85px;flex-shrink:0}
/* Sync indicator */
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.dok{background:#2d6a3f}.derr{background:#9b2c2c}.dld{background:#c5981a;animation:pulse 1s infinite}
/* Notif */
.nd{width:7px;height:7px;background:var(--red);border-radius:50%;position:absolute;top:-2px;right:-2px;animation:pulse 1.5s infinite}
.np2{position:absolute;top:calc(100% + 4px);right:0;width:320px;max-height:380px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2);z-index:200;animation:slideDown .2s ease}
.ni{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.78rem;cursor:pointer}
.ni:hover{background:var(--bg2)}
.ni.ur{border-left:3px solid var(--red);background:var(--red2)}
/* PIN pad */
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:16px auto 0}
.pin-btn{font-family:var(--ff-m);font-size:1.2rem;font-weight:700;padding:14px;border:1.5px solid var(--border);border-radius:6px;background:#fff;color:var(--ink);cursor:pointer;transition:all .15s;text-align:center}
.pin-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pin-btn:active{transform:scale(.95)}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:12px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
/* Receipt */
.receipt{border:2px solid var(--ink);padding:22px;max-width:480px;margin:0 auto;background:#fff;font-size:.83rem}
.receipt h2{font-family:var(--ff-d);text-align:center;margin-bottom:4px}
.rl{border-bottom:1px dashed var(--border);padding:5px 0;display:flex;justify-content:space-between;gap:8px}
.rt{border-top:2px solid var(--ink);padding-top:8px;margin-top:8px;font-weight:700;font-family:var(--ff-m);display:flex;justify-content:space-between}
/* Camera */
.ca{border:2px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.ca:hover{border-color:var(--accent);background:var(--card)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef,createContext,useContext}=React;

// ═══════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════
const SB="https://wuftzyeajmsxdrbwaawl.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1ZnR6eWVham1zeGRyYndhYXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjczNTgsImV4cCI6MjA4OTQ0MzM1OH0.QUeDRP1IpHCjvecqAOEZAqmMalEFlCLXylZP5D5iLog";
const SH={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=representation"};

const sbGet=async(t,q="")=>{const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:SH});if(!r.ok)throw new Error(await r.text());return r.json()};
const sbPost=async(t,d)=>{const r=await fetch(`${SB}/rest/v1/${t}`,{method:"POST",headers:SH,body:JSON.stringify(Array.isArray(d)?d:[d])});if(!r.ok)throw new Error(await r.text());return r.json()};
const sbPatch=async(t,q,d)=>{const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{method:"PATCH",headers:{...SH,"Prefer":"return=representation"},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()};
const sbUpsert=async(t,d)=>{const r=await fetch(`${SB}/rest/v1/${t}`,{method:"POST",headers:{...SH,"Prefer":"return=representation,resolution=merge-duplicates"},body:JSON.stringify(Array.isArray(d)?d:[d])});if(!r.ok)throw new Error(await r.text());return r.json()};

// ═══════════════════════════════════════════════════
// SUPERADMIN — HARDCODED (no record in database)
// Change PIN here to update. Never stored anywhere.
// ═══════════════════════════════════════════════════
const SUPER={
  username:"sovereign",
  pin:"141516",     // ← CHANGE THIS PIN
  role:"admin",
  name:"Proprietor / SuperAdmin",
  section:"both",
  isSuperAdmin:true,
};

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const SEC_A=["Crèche","KG1","KG2","Nursery 1","Nursery 2","Primary 1"];
const SEC_B=["Primary 2","Primary 3","Primary 4","Primary 5","JSS1","JSS2","JSS3","SS1","SS2","SS3"];
const ALL_CLS=[...SEC_A,...SEC_B];
const DEF_CATS=["Tuition Fee","Exam Fee","Report Card Fee","End of Year Party Fee","Sports Fee","Sports Wears","Outstanding/Backlog"];
const PAY_MODES=["Cash","Bank Transfer","POS"];
const EXAM_CLS=["Primary 5","JSS3","SS3"];
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];

// class_key → SSFP class mapping
function mapKey(ck){
  if(!ck)return null;
  const k=ck.toLowerCase().replace(/[\s_]+/g,"-");
  const M={
    "creche":"Crèche","crèche":"Crèche","crache":"Crèche",
    "kg1":"KG1","kg-1":"KG1","kg2":"KG2","kg-2":"KG2",
    "nursery1":"Nursery 1","nursery-1":"Nursery 1",
    "nursery2":"Nursery 2","nursery-2":"Nursery 2",
    "primary1":"Primary 1","primary-1":"Primary 1",
    "primary2":"Primary 2","primary-2":"Primary 2",
    "primary3":"Primary 3","primary-3":"Primary 3",
    "primary4":"Primary 4","primary-4":"Primary 4",
    "primary5":"Primary 5","primary-5":"Primary 5",
    "jss1":"JSS1","jss-1":"JSS1","js1":"JSS1",
    "jss2":"JSS2","jss-2":"JSS2","js2":"JSS2",
    "jss3":"JSS3","jss-3":"JSS3","js3":"JSS3",
    "ss1":"SS1","ss-1":"SS1","s1":"SS1",
    "ss2":"SS2","ss-2":"SS2","s2":"SS2",
    "ss3":"SS3","ss-3":"SS3","s3":"SS3",
  };
  if(M[k])return M[k];
  // Strip science/arts/commercial variant suffix
  const base=k.replace(/-(science|arts?|commercial|social|tech|general|vocational|basic|a|b|c)(\d*)$/i,"");
  if(M[base])return M[base];
  return M[base.replace(/-/g,"")]||null;
}

// Helpers
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{if(!d)return"";const s=(d+"").slice(0,10).split("-");return`${s[2]}/${s[1]}/${s[0]}`};
const dayN=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long"});
const N=n=>"₦"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const LS={g:(k,f)=>{try{const v=localStorage.getItem("ssfp_"+k);return v?JSON.parse(v):f}catch{return f}},s:(k,v)=>{try{localStorage.setItem("ssfp_"+k,JSON.stringify(v))}catch{}}};

// Simple PIN hash (SHA-256 via browser API) — PINs never stored plain
const hashPin=async(pin,username)=>{
  const data=new TextEncoder().encode(pin+":"+username+":ssfp2025");
  const buf=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};
const checkSuperPin=async(pin)=>{
  const h=await hashPin(SUPER.pin,SUPER.username);
  const entered=await hashPin(pin,SUPER.username);
  return h===entered;
};

// ═══════════════════════════════════════════════════
// CONTEXT
// ═══════════════════════════════════════════════════
const Ctx=createContext();
function Prov({children}){
  const[session,setSession]=useState(null); // {user, role, section, name, isSuperAdmin}
  const[dbOk,setDbOk]=useState(null); // null=loading, true, false
  const[syncMsg,setSyncMsg]=useState("Connecting…");

  // Core data
  const[students,setStudents]=useState({});
  const[cashBook,setCashBook]=useState([]);
  const[categories,setCategories]=useState(DEF_CATS);
  const[feeTargets,setFeeTargets]=useState({});
  const[salaries,setSalaries]=useState([]);
  const[extExams,setExtExams]=useState([]);
  const[lessonWeeks,setLessonWeeks]=useState([]);
  const[lessonCur,setLessonCur]=useState({days:{},teacherRate:2500,teacherCount:10});
  const[termCfg,setTermCfg]=useState({term:"Term 1",year:"2025/2026",activeCats:DEF_CATS.reduce((a,c)=>({...a,[c]:true}),{})});
  const[directPay,setDirectPay]=useState([]);
  const[scholarships,setScholarships]=useState([]);
  const[auditLog,setAuditLog]=useState([]);
  const[notifs,setNotifs]=useState([]);

  // ── Initial load ──
  useEffect(()=>{
    (async()=>{
      try{
        // 1. Pull students from result portal
        setSyncMsg("Loading students…");
        const raw=await sbGet("students","select=id,name,class_key,admno,gender&order=name.asc");
        const mapped={};
        raw.forEach(s=>{
          const cls=mapKey(s.class_key);
          if(!cls)return;
          if(!mapped[cls])mapped[cls]=[];
          if(!mapped[cls].find(x=>x.admno===s.admno&&x.name===s.name))
            mapped[cls].push({name:s.name,admno:s.admno||"",gender:s.gender||"",supaId:s.id,payments:[],arrears:0});
        });

        // 2. Load SSFP tables (gracefully — tables may not exist yet)
        let cb=[],cfg=null,sal=[],ext=[],lw=[],dp=[],sch=[],al=[],nf=[];
        const tryGet=async(t,q)=>{try{return await sbGet(t,q)}catch{return[]}};

        [cb,sal,ext,lw,dp,sch,al,nf]=await Promise.all([
          tryGet("ssfp_cashbook","order=timestamp.asc"),
          tryGet("ssfp_salaries","order=created_at.desc"),
          tryGet("ssfp_ext_exams","order=created_at.desc"),
          tryGet("ssfp_lesson_weeks","order=created_at.desc"),
          tryGet("ssfp_direct_pay","order=created_at.desc"),
          tryGet("ssfp_scholarships","order=created_at.desc"),
          tryGet("ssfp_audit_log","order=time.desc&limit=300"),
          tryGet("ssfp_notifications","order=time.desc&limit=100"),
        ]);
        // Settings (single row)
        try{const r=await sbGet("ssfp_settings","key=eq.main&limit=1");if(r&&r[0])cfg=r[0].value}catch{}

        // 3. Merge payments into student records
        cb.filter(e=>e.entry_type==="Income"&&!e.reversed).forEach(e=>{
          if(!mapped[e.class_name])return;
          const si=mapped[e.class_name].findIndex(s=>s.name===e.student);
          if(si>=0)mapped[e.class_name][si].payments.push({
            id:e.entry_id,date:e.date,category:e.category,
            amount:e.amount,mode:e.mode,isPriorTerm:e.is_prior_term||false,timestamp:e.timestamp});
        });
        cb.filter(e=>e.reversal_of).forEach(e=>{
          if(!mapped[e.class_name])return;
          const si=mapped[e.class_name].findIndex(s=>s.name===e.student);
          if(si>=0)mapped[e.class_name][si].payments.push({
            id:e.entry_id,date:e.date,category:e.category,
            amount:-Math.abs(e.amount),mode:e.mode,note:"Reversal",timestamp:e.timestamp});
        });

        setStudents(mapped);setCashBook(cb);
        if(cfg){setCategories(cfg.categories||DEF_CATS);setFeeTargets(cfg.feeTargets||{});setTermCfg(cfg.termCfg||termCfg);setLessonCur(cfg.lessonCur||lessonCur)}
        setSalaries(sal);setExtExams(ext);setLessonWeeks(lw);
        setDirectPay(dp);setScholarships(sch);setAuditLog(al);setNotifs(nf);

        setDbOk(true);setSyncMsg(`Synced — ${raw.length} students`);
      }catch(e){
        console.error("DB init:",e);
        setDbOk(false);setSyncMsg("Offline — local cache");
        // Fallback
        setStudents(LS.g("students",{}));setCashBook(LS.g("cashbook",[]));
        setCategories(LS.g("cats",DEF_CATS));setFeeTargets(LS.g("targets",{}));
        setTermCfg(LS.g("termCfg",{term:"Term 1",year:"2025/2026",activeCats:DEF_CATS.reduce((a,c)=>({...a,[c]:true}),{})}));
        setSalaries(LS.g("salaries",[]));setExtExams(LS.g("extExams",[]));
        setLessonWeeks(LS.g("lessonWeeks",[]));setLessonCur(LS.g("lessonCur",{days:{},teacherRate:2500,teacherCount:10}));
        setDirectPay(LS.g("directPay",[]));setScholarships(LS.g("scholarships",[]));
        setAuditLog(LS.g("auditLog",[]));setNotifs(LS.g("notifs",[]));
      }
    })();
  },[]);

  // ── Settings save ──
  const saveSettings=useCallback(async(cats,ft,tc,lc)=>{
    const val={categories:cats,feeTargets:ft,termCfg:tc,lessonCur:lc};
    try{await sbUpsert("ssfp_settings",[{key:"main",value:val}])}catch{}
    LS.s("cats",cats);LS.s("targets",ft);LS.s("termCfg",tc);LS.s("lessonCur",lc);
  },[]);

  // ── Cash book ──
  const saveCashEntry=useCallback(async(entry)=>{
    const row={entry_id:entry.id,date:entry.date,class_name:entry.cls,student:entry.student,
      category:entry.category,amount:entry.amount,mode:entry.mode,entry_type:entry.type,
      timestamp:entry.timestamp,section:entry.section,is_prior_term:entry.isPriorTerm||false,
      reversed:false,reversal_of:null,note:entry.note||null};
    try{await sbPost("ssfp_cashbook",row)}catch(e){console.error(e)}
    setCashBook(prev=>{const n=[...prev,row];LS.s("cashbook",n);return n});
  },[]);

  const markReversed=useCallback(async(id)=>{
    try{await sbPatch("ssfp_cashbook",`entry_id=eq.${id}`,{reversed:true})}catch{}
    setCashBook(prev=>{const n=prev.map(e=>e.entry_id===id?{...e,reversed:true}:e);LS.s("cashbook",n);return n});
  },[]);

  // ── Notifs & audit ──
  const addNotif=useCallback(async(msg,type="warning")=>{
    const n={nid:uid(),msg,type,time:Date.now(),read:false};
    try{await sbPost("ssfp_notifications",n)}catch{}
    setNotifs(prev=>[n,...prev].slice(0,100));
  },[]);

  const addAudit=useCallback(async(action,details,who)=>{
    const entry={aid:uid(),action,details,time:Date.now(),user:who||session?.name||"system"};
    try{await sbPost("ssfp_audit_log",entry)}catch{}
    setAuditLog(prev=>[entry,...prev].slice(0,500));
  },[session]);

  // ── Student refresh ──
  const refreshStudents=useCallback(async()=>{
    setSyncMsg("Syncing…");setDbOk(null);
    try{
      const raw=await sbGet("students","select=id,name,class_key,admno,gender&order=name.asc");
      const mapped={};
      raw.forEach(s=>{
        const cls=mapKey(s.class_key);if(!cls)return;
        if(!mapped[cls])mapped[cls]=[];
        if(!mapped[cls].find(x=>x.admno===s.admno&&x.name===s.name))
          mapped[cls].push({name:s.name,admno:s.admno||"",gender:s.gender||"",supaId:s.id,payments:[],arrears:0});
      });
      // Re-merge existing payments
      cashBook.filter(e=>e.entry_type==="Income"&&!e.reversed).forEach(e=>{
        if(!mapped[e.class_name])return;
        const si=mapped[e.class_name].findIndex(s=>s.name===e.student);
        if(si>=0)mapped[e.class_name][si].payments.push({id:e.entry_id,date:e.date,category:e.category,amount:e.amount,mode:e.mode,isPriorTerm:e.is_prior_term||false,timestamp:e.timestamp});
      });
      setStudents(mapped);setDbOk(true);setSyncMsg(`Synced — ${raw.length} students`);
    }catch(e){setDbOk(false);setSyncMsg("Sync failed")}
  },[cashBook]);

  // ── Update categories etc. and persist ──
  const updCats=v=>{setCategories(v);saveSettings(v,feeTargets,termCfg,lessonCur)};
  const updTargets=v=>{setFeeTargets(v);saveSettings(categories,v,termCfg,lessonCur)};
  const updTermCfg=v=>{setTermCfg(v);saveSettings(categories,feeTargets,v,lessonCur)};
  const updLessonCur=v=>{setLessonCur(v);saveSettings(categories,feeTargets,termCfg,v)};

  const saveLW=async w=>{try{await sbPost("ssfp_lesson_weeks",w)}catch{};setLessonWeeks(p=>{const n=[...p,w];LS.s("lessonWeeks",n);return n})};
  const saveSal=async s=>{try{await sbPost("ssfp_salaries",s)}catch{};setSalaries(p=>{const n=[...p,s];LS.s("salaries",n);return n})};
  const saveExt=async e=>{try{await sbPost("ssfp_ext_exams",e)}catch{};setExtExams(p=>{const n=[...p,e];LS.s("extExams",n);return n})};
  const saveDP=async d=>{try{await sbPost("ssfp_direct_pay",d)}catch{};setDirectPay(p=>{const n=[...p,d];LS.s("directPay",n);return n})};
  const saveSch=async s=>{try{await sbPost("ssfp_scholarships",s)}catch{};setScholarships(p=>{const n=[...p,s];LS.s("scholarships",n);return n})};

  return<Ctx.Provider value={{
    session,setSession,dbOk,syncMsg,refreshStudents,
    students,setStudents,cashBook,setCashBook,
    categories,updCats,feeTargets,updTargets,
    salaries,extExams,lessonWeeks,lessonCur,updLessonCur,
    termCfg,updTermCfg,directPay,scholarships,
    auditLog,notifs,setNotifs,
    saveCashEntry,markReversed,addNotif,addAudit,
    saveLW,saveSal,saveExt,saveDP,saveSch,
  }}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

function App(){

// ═══════════════════════════════════════════════════
// AUTH GATE — Username + PIN
// ═══════════════════════════════════════════════════
function AuthGate(){
  const{setSession,dbOk,syncMsg,addAudit}=useApp();
  const[step,setStep]=useState("username"); // username | pin
  const[username,setUsername]=useState("");
  const[pin,setPin]=useState("");
  const[users,setUsers]=useState([]);
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[shakeKey,setShakeKey]=useState(0);
  const pinRef=useRef();

  // Load approved users from Supabase
  useEffect(()=>{
    (async()=>{try{const r=await sbGet("ssfp_users","is_active=eq.true&order=name.asc");setUsers(r)}catch{setUsers(LS.g("users",[]))}})();
  },[]);

  async function checkUsername(){
    const u=username.trim().toLowerCase();
    if(!u){setErr("Enter your username.");return}
    // Check superadmin
    if(u===SUPER.username){setStep("pin");setErr("");return}
    // Check DB users
    const found=users.find(x=>x.username.toLowerCase()===u);
    if(!found){setErr("Username not recognised. Contact Admin.");setShakeKey(k=>k+1);return}
    if(!found.is_active){setErr("Account disabled. Contact Admin.");return}
    setStep("pin");setErr("");
  }

  function addDigit(d){
    if(pin.length>=6)return;
    const np=pin+d;
    setPin(np);
    if(np.length===6)setTimeout(()=>verify(np),80);
  }
  function delDigit(){setPin(p=>p.slice(0,-1))}

  async function verify(p){
    setLoading(true);setErr("");
    const u=username.trim().toLowerCase();
    try{
      // SuperAdmin check
      if(u===SUPER.username){
        const ok=await checkSuperPin(p);
        if(ok){
          setSession({...SUPER,isSuperAdmin:true});
          addAudit("LOGIN","SuperAdmin login","SuperAdmin");
          return;
        }else{setErr("Incorrect PIN.");setPin("");setShakeKey(k=>k+1);setLoading(false);return}
      }
      // Regular user
      const found=users.find(x=>x.username.toLowerCase()===u);
      if(!found){setErr("User not found.");setPin("");setLoading(false);return}
      const hash=await hashPin(p,u);
      if(hash!==found.pin_hash){setErr("Incorrect PIN.");setPin("");setShakeKey(k=>k+1);setLoading(false);return}
      setSession({user:found.username,role:found.role,section:found.section,name:found.name,isSuperAdmin:false});
      addAudit("LOGIN",`${found.name} (${found.role}) logged in`,found.name);
    }catch(e){setErr("Authentication error.");setPin("");}
    setLoading(false);
  }

  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"linear-gradient(145deg,var(--bg),var(--bg2))",padding:20}}>
      <div className="fi" style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"32px 24px",maxWidth:360,width:"100%",textAlign:"center",boxShadow:"var(--sh2)"}}>
        <div style={{display:"inline-block",fontFamily:"var(--ff-d)",fontSize:24,fontWeight:700,color:"var(--headerText)",background:"var(--header)",borderRadius:6,padding:"8px 22px",marginBottom:12,letterSpacing:3}}>SSFP</div>
        <h1 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem",color:"var(--ink)",margin:"0 0 4px"}}>Sovereign School Finance Portal</h1>
        <div style={{fontSize:".7rem",color:"var(--muted)",marginBottom:20}}>
          <span className={"dot "+(dbOk===null?"dld":dbOk?"dok":"derr")}/>{syncMsg}
        </div>

        {step==="username"&&(
          <div key={"us"+shakeKey} className={shakeKey?"shake":""}>
            <div className="fl" style={{marginBottom:12,textAlign:"left"}}>
              <span className="flb">Username</span>
              <input className="inp" value={username} onChange={e=>setUsername(e.target.value)} placeholder="Enter your username" autoFocus
                onKeyDown={e=>e.key==="Enter"&&checkUsername()} style={{textAlign:"center",fontFamily:"var(--ff-m)"}}/>
            </div>
            {err&&<div className="me">{err}</div>}
            <button className="btn bp" style={{width:"100%"}} onClick={checkUsername}>CONTINUE</button>
          </div>
        )}

        {step==="pin"&&(
          <div>
            <p style={{fontSize:".8rem",color:"var(--muted)",marginBottom:4}}>Welcome — enter your 6-digit PIN</p>
            <p style={{fontFamily:"var(--ff-m)",fontSize:".9rem",fontWeight:700,marginBottom:8}}>{username}</p>
            {/* PIN dots */}
            <div key={"pin"+shakeKey} className={shakeKey?"pin-dots shake":"pin-dots"}>
              {[0,1,2,3,4,5].map(i=><div key={i} className={"pin-dot"+(i<pin.length?" filled":"")}/>)}
            </div>
            {err&&<div className="me" style={{fontSize:".75rem"}}>{err}</div>}
            {loading?<div style={{padding:16,color:"var(--muted)",fontSize:".8rem"}}>Verifying…</div>:(
              <>
                <div className="pin-pad">
                  {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(
                    <button key={i} className="pin-btn"
                      onClick={()=>d==="⌫"?delDigit():d!==""&&addDigit(d.toString())}
                      style={{opacity:d===""?0:1,cursor:d===""?"default":"pointer"}}>
                      {d}
                    </button>
                  ))}
                </div>
                <button className="btn bgh bs" style={{marginTop:14,width:"100%"}} onClick={()=>{setStep("username");setPin("");setErr("")}}>← Back</button>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

          {isAdmin&&<div style={{position:"relative"}}>

function NPanel({close}){

  const mr=id=>{const u=(notifs||[]).map(n=>n.nid===id?{...n,read:true}:n);setNotifs(u);try{sbPatch("ssfp_notifications",`nid=eq.${id}`,{read:true})}catch{}};
  return<div className="np2">
    <div style={{padding:"9px 14px",fontWeight:600,borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",fontSize:".82rem"}}>

    {(!notifs||notifs.length===0)&&<div className="er">No alerts</div>}
    {(notifs||[]).slice(0,30).map(n=><div key={n.nid} className={"ni"+(n.read?"":" ur")} onClick={()=>mr(n.nid)}>
      <div style={{fontWeight:n.read?400:600}}>{n.type==="error"?"🚨":"⚠️"} {n.msg}</div>
      <div style={{fontSize:".66rem",color:"var(--muted)",marginTop:2}}>{new Date(n.time).toLocaleString()}</div>
    </div>)}
  </div>;
}

// ═══════════════════════════════════════════════════
// USER MANAGEMENT (Admin only)
// ═══════════════════════════════════════════════════
function UserMgmt(){
  const{session,addAudit}=useApp();
  const[users,setUsers]=useState([]);
  const[form,setForm]=useState({name:"",username:"",role:"bursarA",section:"A",pin:"",pin2:""});
  const[msg,setMsg]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{try{const r=await sbGet("ssfp_users","order=name.asc");setUsers(r)}catch{setUsers(LS.g("users",[]))}setLoading(false)})();
  },[]);

  async function addUser(){
    if(!form.name.trim()||!form.username.trim()||!form.pin){setMsg({t:1,m:"Fill name, username and PIN."});return}
    if(form.pin!==form.pin2){setMsg({t:1,m:"PINs do not match."});return}
    if(form.pin.length<4){setMsg({t:1,m:"PIN must be at least 4 digits."});return}
    if(!/^\d+$/.test(form.pin)){setMsg({t:1,m:"PIN must be numbers only."});return}
    if(form.username.trim().toLowerCase()===SUPER.username){setMsg({t:1,m:"That username is reserved."});return}
    if(users.find(u=>u.username.toLowerCase()===form.username.trim().toLowerCase())){setMsg({t:1,m:"Username already exists."});return}
    const hash=await hashPin(form.pin,form.username.trim().toLowerCase());
    const newUser={uid:uid(),name:form.name.trim(),username:form.username.trim().toLowerCase(),role:form.role,section:form.section,pin_hash:hash,is_active:true,created_by:session.name,created_at:new Date().toISOString()};
    try{await sbPost("ssfp_users",newUser)}catch(e){console.error(e)}
    const up=[...users,newUser];setUsers(up);LS.s("users",up);
    addAudit("ADD_USER",`Created user ${newUser.username} (${newUser.role})`,session.name);
    setForm({name:"",username:"",role:"bursarA",section:"A",pin:"",pin2:""});
    setMsg({t:0,m:`User "${newUser.username}" created successfully.`});setTimeout(()=>setMsg(null),3e3);
  }

  async function toggleUser(uid,active){
    try{await sbPatch("ssfp_users",`uid=eq.${uid}`,{is_active:active})}catch{}
    setUsers(p=>p.map(u=>u.uid===uid?{...u,is_active:active}:u));
    addAudit(active?"ENABLE_USER":"DISABLE_USER",`User ${uid}`,session.name);
  }

  async function resetPin(u){
    const newPin=prompt(`Enter new PIN for ${u.name}:`);
    if(!newPin||!/^\d{4,8}$/.test(newPin)){alert("PIN must be 4-8 digits.");return}
    const hash=await hashPin(newPin,u.username);
    try{await sbPatch("ssfp_users",`uid=eq.${u.uid}`,{pin_hash:hash})}catch{}
    setUsers(p=>p.map(x=>x.uid===u.uid?{...x,pin_hash:hash}:x));
    addAudit("RESET_PIN",`PIN reset for ${u.username}`,session.name);
    alert("PIN updated.");
  }

  return<div className="fi">
    <h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.2rem",marginBottom:14}}>🔐 User Management</h2>
    {msg&&<div className={msg.t?"me":"mo"}>{msg.m}</div>}
    <div className="card" style={{borderLeft:"4px solid var(--red)"}}>
      <div className="ct">SuperAdmin Account</div>
      <p style={{fontSize:".8rem",color:"var(--muted)"}}>The SuperAdmin (proprietor) account is hardcoded in the system. It does not appear in this list and cannot be created, modified, or deleted from here. Username: <strong style={{fontFamily:"var(--ff-m)"}}>{SUPER.username}</strong>. PIN is set directly in the source file.</p>
    </div>
    <div className="card">
      <div className="ct">Add Authorised User</div>
      <div className="gf">
        <div className="fl"><span className="flb">Full Name</span><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="inp" placeholder="Staff full name"/></div>
        <div className="fl"><span className="flb">Username</span><input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} className="inp" placeholder="e.g. mrs.adeyemi"/></div>
        <div className="fl"><span className="flb">Role</span><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} className="sel">
          <option value="admin">Administrator</option>
          <option value="bursarA">Bursar — Section A</option>
          <option value="bursarB">Bursar — Section B</option>
        </select></div>
        <div className="fl"><span className="flb">Section Access</span><select value={form.section} onChange={e=>setForm({...form,section:e.target.value})} className="sel">
          <option value="A">Section A only</option>
          <option value="B">Section B only</option>
          <option value="both">Both Sections</option>
        </select></div>
        <div className="fl"><span className="flb">PIN (digits only)</span><input type="password" inputMode="numeric" maxLength={8} value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"")})} className="inp" placeholder="4–8 digit PIN"/></div>
        <div className="fl"><span className="flb">Confirm PIN</span><input type="password" inputMode="numeric" maxLength={8} value={form.pin2} onChange={e=>setForm({...form,pin2:e.target.value.replace(/\D/g,"")})} className="inp" placeholder="Repeat PIN"/></div>
      </div>
      <button className="btn bp" style={{marginTop:12}} onClick={addUser}>CREATE USER</button>
      <p className="hint" style={{marginTop:6}}>PINs are hashed before storage — never stored in plain text.</p>
    </div>
    <div className="card">
      <div className="ct">Authorised Users ({users.length})</div>
      {loading?<p className="hint">Loading…</p>:
      <div className="tw"><table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Section</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        {users.length===0&&<tr><td colSpan={6} className="er">No users yet. Add one above.</td></tr>}
        {users.map(u=><tr key={u.uid}>
          <td style={{fontWeight:500}}>{u.name}</td>
          <td className="mn">{u.username}</td>
          <td><span className={"badge "+(u.role==="admin"?"bdr":u.role==="bursarA"?"bdb":"bdg")}>{u.role}</span></td>
          <td>{u.section}</td>
          <td>{u.is_active?<span className="badge bdg">Active</span>:<span className="badge bdr">Disabled</span>}</td>
          <td style={{display:"flex",gap:5}}>
            <button className={"btn bs "+(u.is_active?"br":"bg2")} onClick={()=>toggleUser(u.uid,!u.is_active)}>{u.is_active?"Disable":"Enable"}</button>
            <button className="btn bgh bs" onClick={()=>resetPin(u)}>Reset PIN</button>
          </td>
        </tr>)}
      </tbody></table></div>}
    </div>
  </div>;
}

// CASH BOOK
// ═══════════════════════════════════════════════════
function CashBook({sec}){
  const ctx=useApp();
  const session=ctx.session;
  const classes=sec==="A"?SEC_A:SEC_B;
  const entries=useMemo(()=>(ctx.cashBook||[]).filter(e=>e.section===sec).sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.timestamp-b.timestamp),[ctx.cashBook,sec]);
  const activeCats=(ctx.categories||DEF_CATS).filter(c=>ctx.termCfg?.activeCats?.[c]!==false);

  const[date,setDate]=useState(today());
  const[cl,setCl]=useState("");
  const[stu,setStu]=useState("");
  const[cat,setCat]=useState("");
  const[amt,setAmt]=useState("");
  const[mode,setMode]=useState("Cash");
  const[type,setType]=useState("Income");
  const[fd,setFd]=useState(today());
  const[showR,setShowR]=useState(false);
  const[rId,setRId]=useState("");
  const[msg,setMsg]=useState(null);

  const stuList=useMemo(()=>(cl&&ctx.students[cl])?[...ctx.students[cl]].sort((a,b)=>a.name.localeCompare(b.name)).map(s=>s.name):[],[cl,ctx.students]);

  const{op,clBal,dayE}=useMemo(()=>{
    let o=0;
    for(const e of entries)if(e.date<fd)o+=e.entry_type==="Income"?e.amount:-e.amount;
    const de=entries.filter(e=>e.date===fd);
    let c=o;for(const e of de)c+=e.entry_type==="Income"?e.amount:-e.amount;
    return{op:o,clBal:c,dayE:de};
  },[entries,fd]);

  const liq=useMemo(()=>(ctx.cashBook||[]).filter(e=>e.section===sec).reduce((s,e)=>s+(e.entry_type==="Income"?e.amount:-e.amount),0),[ctx.cashBook,sec]);

  async function submit(){
    if(!cl||!stu||!cat||!amt||isNaN(parseFloat(amt))){setMsg({t:1,m:"Fill all fields."});return}
    const a=Math.abs(parseFloat(parseFloat(amt).toFixed(2)));
    if(a<=0){setMsg({t:1,m:"Amount must be > 0."});return}
    const eid=uid();
    await ctx.saveCashEntry({id:eid,date,cls:cl,student:stu,category:cat,amount:a,mode,type,timestamp:Date.now(),section:sec,isPriorTerm:cat==="Outstanding/Backlog"});
    // Update local student payments immediately
    if(type==="Income"){
      const up={...ctx.students};
      if(up[cl]){
        const idx=up[cl].findIndex(s=>s.name===stu);
        if(idx>=0){
          const copy=[...up[cl]];
          copy[idx]={...copy[idx],payments:[...copy[idx].payments,{id:eid,date,category:cat,amount:a,mode,isPriorTerm:cat==="Outstanding/Backlog",timestamp:Date.now()}]};
          up[cl]=copy;ctx.setStudents(up);
        }
      }
    }
    ctx.addAudit("ENTRY",`${type} ${N(a)} — ${stu} [${cat}]`,session.name);
    if(a>500000)ctx.addNotif(`Large ${type.toLowerCase()} ${N(a)} for ${stu} in ${cl}. Verify.`);
    setAmt("");setCat("");setStu("");
    setMsg({t:0,m:`${type} ${N(a)} for ${stu} saved.`});setTimeout(()=>setMsg(null),3e3);
  }

  async function doRev(){
    const orig=(ctx.cashBook||[]).find(e=>e.entry_id===rId);
    if(!orig){setMsg({t:1,m:"Entry ID not found."});return}
    if(orig.reversed){setMsg({t:1,m:"Already reversed."});return}
    const eid=uid();
    await ctx.markReversed(orig.entry_id);
    await ctx.saveCashEntry({id:eid,date:today(),cls:orig.class_name,student:orig.student,category:orig.category,amount:orig.amount,mode:orig.mode,type:orig.entry_type==="Income"?"Expense":"Income",timestamp:Date.now(),section:orig.section,isPriorTerm:orig.is_prior_term,note:"Reversal of "+orig.entry_id});
    // Update student ledger
    if(orig.entry_type==="Income"){
      const up={...ctx.students};const c=orig.class_name;
      if(up[c]){const i=up[c].findIndex(s=>s.name===orig.student);
        if(i>=0){const cp=[...up[c]];cp[i]={...cp[i],payments:[...cp[i].payments,{id:eid,date:today(),category:orig.category,amount:-orig.amount,mode:orig.mode,note:"Reversal",timestamp:Date.now()}]};up[c]=cp;ctx.setStudents(up)}}
    }
    ctx.addAudit("REVERSAL",`Reversed ${orig.entry_id.slice(0,8)} (${N(orig.amount)} ${orig.student})`,session.name);
    ctx.addNotif(`Reversal: ${N(orig.amount)} for ${orig.student}. Entry ${orig.entry_id.slice(0,8)}.`);
    setRId("");setShowR(false);setMsg({t:0,m:"Reversal posted."});setTimeout(()=>setMsg(null),3e3);
  }

  return<div className="fi">
    <div className="fb" style={{marginBottom:12}}>
      <h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem"}}>📒 Cash Book — Section {sec}</h2>
      <div style={{fontFamily:"var(--ff-m)",fontSize:".76rem",background:"var(--card)",border:"1px solid var(--border)",padding:"4px 11px",borderRadius:4}}>Liquidity: <strong style={{color:liq>=0?"var(--green)":"var(--red)"}}>{N(liq)}</strong></div>
    </div>
    {msg&&<div className={msg.t?"me":"mo"}>{msg.m}</div>}
    <div className="card"><div className="ct">New Entry</div>
      <div className="gf">
        <div className="fl"><span className="flb">Date</span><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="inp"/></div>
        <div className="fl"><span className="flb">Type</span>
          <div style={{display:"flex",borderRadius:4,overflow:"hidden",border:"1px solid var(--border)"}}>
            {["Income","Expense"].map(t=><button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"7px 0",border:"none",cursor:"pointer",fontWeight:type===t?700:400,fontSize:".78rem",background:type===t?(t==="Income"?"var(--green)":"var(--red)"):"#fff",color:type===t?"#fff":"var(--muted)"}}>{t}</button>)}
          </div>
        </div>
        <div className="fl"><span className="flb">Class</span><select value={cl} onChange={e=>{setCl(e.target.value);setStu("")}} className="sel"><option value="">— Select —</option>{classes.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fl"><span className="flb">Student</span><select value={stu} onChange={e=>setStu(e.target.value)} className="sel" disabled={!cl}><option value="">— Select —</option>{stuList.map(n=><option key={n}>{n}</option>)}</select>
          {cl&&stuList.length===0&&<span className="hint">No students. Sync or import.</span>}
        </div>
        <div className="fl"><span className="flb">Category</span><select value={cat} onChange={e=>setCat(e.target.value)} className="sel"><option value="">— Select —</option>{activeCats.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fl"><span className="flb">Amount (₦)</span><input type="number" min="0" step=".01" value={amt} onChange={e=>setAmt(e.target.value)} className="inpm" placeholder="0.00"/></div>
        <div className="fl"><span className="flb">Mode</span><select value={mode} onChange={e=>setMode(e.target.value)} className="sel">{PAY_MODES.map(m=><option key={m}>{m}</option>)}</select></div>
      </div>
      <div className="fr" style={{marginTop:12}}>
        <button className="btn bp" onClick={submit}>SUBMIT ENTRY</button>
        <button className="btn bo" onClick={()=>setShowR(!showR)}>{showR?"Cancel":"⤺ Reversal"}</button>
      </div>
      {showR&&<div style={{marginTop:10,padding:12,background:"var(--red2)",border:"1px dashed var(--red)",borderRadius:4}}>
        <div className="fl"><span className="flb">Original Entry ID</span><input value={rId} onChange={e=>setRId(e.target.value)} className="inp" placeholder="Paste entry_id"/></div>
        <button className="btn br bs" style={{marginTop:8}} onClick={doRev}>CONFIRM REVERSAL</button>
      </div>}
    </div>
    <div className="card">
      <div className="fb"><div className="ct">Ledger View</div><input type="date" value={fd} onChange={e=>setFd(e.target.value)} className="inp" style={{width:155}}/></div>
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        {[["Opening",op,"var(--border)","var(--ink)"],["Closing",clBal,clBal>=0?"var(--green)":"var(--red)",clBal>=0?"var(--green)":"var(--red)"],["Day",dayN(fd),"var(--border)","var(--ink)"]].map(([l,v,bc,vc])=>
          <div key={l} style={{flex:1,minWidth:130,padding:"9px 12px",background:"var(--bg2)",border:"1.5px solid "+bc,borderRadius:5,textAlign:"center"}}>
            <div className="flb">{l}</div><div style={{fontFamily:"var(--ff-m)",fontSize:"1rem",fontWeight:700,marginTop:3,color:vc}}>{typeof v==="number"?N(v):v}</div>
          </div>)}
      </div>
      <div className="tw"><table><thead><tr><th>ID</th><th>Time</th><th>Student</th><th>Class</th><th>Category</th><th>Mode</th><th className="r">Income</th><th className="r">Expense</th><th className="r">Running</th><th>Note</th></tr></thead>
      <tbody>
        {dayE.length===0&&<tr><td colSpan={10} className="er">No entries for {fmtD(fd)}</td></tr>}
        {dayE.map((e,i)=>{
          let rb=op;for(let j=0;j<=i;j++)rb+=dayE[j].entry_type==="Income"?dayE[j].amount:-dayE[j].amount;
          return<tr key={e.entry_id} className={e.reversed?"rvd":e.reversal_of?"rvr":""}>
            <td className="mn">{e.entry_id.slice(0,8)}</td>
            <td>{new Date(e.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</td>
            <td>{e.student}</td><td>{e.class_name}</td>
            <td>{e.category}{e.is_prior_term?" ⏮":""}</td><td>{e.mode}</td>
            <td className="my">{e.entry_type==="Income"?N(e.amount):""}</td>
            <td className="mr">{e.entry_type==="Expense"?N(e.amount):""}</td>
            <td className="my" style={{fontWeight:700}}>{N(rb)}</td>
            <td>{e.reversed?"REVERSED":e.note||""}</td>
          </tr>;
        })}
      </tbody></table></div>
    </div>
  </div>;
}

// CLASS PORTAL
// ═══════════════════════════════════════════════════
function ClassPortal({sec}){
  const ctx=useApp();
  const classes=sec==="A"?SEC_A:SEC_B;
  const[sc,setSc]=useState(classes[0]);
  const[ocrText,setOcrText]=useState("");
  const[showOCR,setShowOCR]=useState(false);
  const[ocrLoad,setOcrLoad]=useState(false);
  const[msg,setMsg]=useState(null);
  const fileRef=useRef();
  const list=ctx.students[sc]||[];

  async function handleOCR(file){
    if(!file)return;setOcrLoad(true);
    try{
      const b64=await new Promise((r,j)=>{const f=new FileReader();f.onload=()=>r(f.result.split(",")[1]);f.onerror=j;f.readAsDataURL(file)});
      const resp=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer YOUR_OPENROUTER_KEY_HERE"},
        body:JSON.stringify({model:"google/gemini-2.0-flash-001",messages:[{role:"user",content:[
          {type:"text",text:"Extract all student names from this image. Return ONLY a plain list of names, one per line. No numbers, no extra text."},
          {type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}}
        ]}]})});
      const data=await resp.json();
      const text=data?.choices?.[0]?.message?.content||"";
      if(text.trim()){setOcrText(text.trim());setShowOCR(true)}else setMsg({t:1,m:"No names extracted. Try again or paste manually."});
    }catch(e){setMsg({t:1,m:"OCR failed. Paste names manually."})}
    setOcrLoad(false);
  }

  async function bulkImport(){
    const names=ocrText.split("\n").map(n=>n.trim()).filter(Boolean);
    if(!names.length)return;
    const up={...ctx.students};if(!up[sc])up[sc]=[];
    let added=0;
    for(const nm of names){
      if(!up[sc].find(s=>s.name.toLowerCase()===nm.toLowerCase())){
        const ck=sc.toLowerCase().replace(/[èé]/g,"e").replace(/\s+/g,"");
        const ns={name:nm,class_key:ck,admno:"SSFP-"+uid().slice(0,6).toUpperCase(),gender:"",house:"",age:"",photo:""};
        try{const r=await sbPost("students",ns);up[sc].push({name:nm,admno:ns.admno,gender:"",supaId:r[0]?.id,payments:[],arrears:0})}
        catch{up[sc].push({name:nm,admno:ns.admno,gender:"",payments:[],arrears:0})}
        added++;
      }
    }
    ctx.setStudents(up);LS.s("students",up);setOcrText("");setShowOCR(false);
    ctx.addAudit("IMPORT",`${added} students → ${sc}`,ctx.session.name);
    setMsg({t:0,m:`${added} imported (${names.length-added} duplicates skipped)`});setTimeout(()=>setMsg(null),3e3);
  }

  return<div className="fi">
    <div className="fb" style={{marginBottom:12}}><h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem"}}>🏫 Class Portal — Section {sec}</h2></div>
    {msg&&<div className={msg.t?"me":"mo"}>{msg.m}</div>}
    <div className="cp">{classes.map(c=><button key={c} className={"pill"+(sc===c?" a":"")} onClick={()=>setSc(c)}>{c} <span style={{fontFamily:"var(--ff-m)",fontSize:".6rem",opacity:.7}}>({(ctx.students[c]||[]).length})</span></button>)}</div>
    <div className="card">
      <div className="fr">
        <input type="file" ref={fileRef} accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleOCR(e.target.files[0])}/>
        <button className="btn bp" onClick={()=>fileRef.current?.click()}>{ocrLoad?"Processing…":"📷 Camera / Gallery"}</button>
        <button className="btn bo" onClick={()=>setShowOCR(!showOCR)}>{showOCR?"Cancel":"📋 Paste Names"}</button>
      </div>
      {showOCR&&<div style={{marginTop:12}}>
        <p className="hint" style={{marginBottom:6}}>One name per line. New students are added to the shared database.</p>
        <textarea value={ocrText} onChange={e=>setOcrText(e.target.value)} className="inp" style={{width:"100%",minHeight:120,fontFamily:"var(--ff-m)",fontSize:".78rem",resize:"vertical"}} placeholder={"Alabi Mubarak\nFatima Bello\nChinedu Okafor"}/>
        <button className="btn bp" style={{marginTop:8}} onClick={bulkImport}>IMPORT TO DATABASE</button>
      </div>}
    </div>
    <div className="tw"><table><thead><tr><th>#</th><th>Name</th><th>Adm No</th><th>Gender</th><th className="r">Total Paid</th><th>Tags</th><th>Status</th></tr></thead>
    <tbody>
      {list.length===0&&<tr><td colSpan={7} className="er">No students in {sc}. Sync or import above.</td></tr>}
      {list.map((s,i)=>{
        const paid=(s.payments||[]).reduce((sum,p)=>sum+p.amount,0);
        const isSch=(ctx.scholarships||[]).some(x=>x.student===s.name&&x.class_name===sc);
        const isDP=(ctx.directPay||[]).some(x=>x.student===s.name&&x.class_name===sc);
        return<tr key={s.admno+s.name}><td>{i+1}</td><td style={{fontWeight:500}}>{s.name}</td><td className="mn">{s.admno}</td><td>{s.gender}</td>
          <td className="my">{N(paid)}</td>
          <td>{isSch&&<span className="badge bdo">Scholar</span>}{isDP&&<span className="badge bdb" style={{marginLeft:3}}>Direct</span>}</td>
          <td>{(s.arrears||0)>0?"⚠️":"✅"}</td></tr>;
      })}
    </tbody></table></div>
  </div>;
}

}

// CLASS ANALYSIS
// ═══════════════════════════════════════════════════
function Analysis({sec}){
  const ctx=useApp();
  const classes=sec==="A"?SEC_A:SEC_B;
  const[sc,setSc]=useState(classes[0]);
  const[cat,setCat]=useState((ctx.categories||DEF_CATS).filter(c=>c!=="Outstanding/Backlog")[0]||"");
  const list=ctx.students[sc]||[];
  const target=ctx.feeTargets?.[cat]||0;
  const an=list.map(s=>{
    const p=(s.payments||[]).filter(x=>x.category===cat&&x.amount>0).reduce((sum,x)=>sum+x.amount,0);
    return{...s,paid:p,ok:target>0&&p>=target,owing:target>0?Math.max(0,target-p):0};
  });
  const totalR=an.reduce((s,a)=>s+a.paid,0);
  const pC=an.filter(a=>a.ok).length;
  const oC=an.filter(a=>!a.ok&&target>0).length;
  const tO=an.reduce((s,a)=>s+a.owing,0);

  return<div className="fi">
    <h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem",marginBottom:12}}>📋 Analysis — Section {sec}</h2>
    <div className="cp">{classes.map(c=><button key={c} className={"pill"+(sc===c?" a":"")} onClick={()=>setSc(c)}>{c} ({(ctx.students[c]||[]).length})</button>)}</div>

function Lessons(){
  const ctx=useApp();const isA=ctx.session?.role==="admin";
  const lc=ctx.lessonCur||{days:{},teacherRate:2500,teacherCount:10};
  const days=lc.days||{};const rate=Number(lc.teacherRate)||2500;const tc=Number(lc.teacherCount)||10;
  const setDC=(d,c,v)=>{const nd={...days};if(!nd[d])nd[d]={};nd[d]={...nd[d],[c]:parseFloat(v)||0};ctx.updLessonCur({...lc,days:nd})};
  const dt={};DAYS.forEach(d=>{dt[d]=ALL_CLS.reduce((s,c)=>s+(days[d]?.[c]||0),0)});
  const gt=Object.values(dt).reduce((s,v)=>s+v,0);
  const tp=rate*tc;const pr=gt-tp;

  async function close(){
    if(!isA)return;
    const w={wid:uid(),date:today(),days:{...days},teacherRate:rate,teacherCount:tc,grandTotal:gt,totalTeacherPay:tp,proprietorShare:pr,created_at:new Date().toISOString()};
    await ctx.saveLW(w);ctx.updLessonCur({days:{},teacherRate:rate,teacherCount:tc});
    ctx.addAudit("LESSON_CLOSE",`${N(gt)} total, ${N(tp)} teachers, ${N(pr)} proprietor`,ctx.session.name);
  }

  return<div className="fi">
    <h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem",marginBottom:8}}>📅 Lesson Portal</h2>
    <p className="hint" style={{marginBottom:12}}>Completely separate from Cash Book. Lesson fees never appear in student ledgers.</p>
    <div className="card"><div className="ct">Week Configuration</div><div className="fr">
      <div className="fl"><span className="flb">Flat Rate / Teacher (₦)</span><input type="number" value={rate} onChange={e=>ctx.updLessonCur({...lc,teacherRate:parseFloat(e.target.value)||0})} className="inpm" style={{width:130}}/></div>
      <div className="fl"><span className="flb">Teachers on Ground</span><input type="number" value={tc} onChange={e=>ctx.updLessonCur({...lc,teacherCount:parseInt(e.target.value)||0})} className="inpm" style={{width:100}}/></div>
    </div></div>
    <div className="card"><div className="ct">Daily Collection by Class</div><div style={{overflowX:"auto"}}>
      <div className="lg" style={{gridTemplateColumns:`130px repeat(${DAYS.length},1fr) 90px`,minWidth:680}}>
        <div className="lh" style={{textAlign:"left",paddingLeft:10}}>Class</div>
        {DAYS.map(d=><div key={d} className="lh">{d.slice(0,3)}</div>)}
        <div className="lh">Total</div>
        {ALL_CLS.map(c=>{
          const rt=DAYS.reduce((s,d)=>s+(days[d]?.[c]||0),0);
          return<React.Fragment key={c}>
            <div className="lc" style={{textAlign:"left",paddingLeft:8,fontFamily:"var(--ff-b)",fontWeight:500,fontSize:".73rem"}}>{c}</div>
            {DAYS.map(d=><div key={d} className="lc"><input type="number" min="0" value={days[d]?.[c]||""} onChange={e=>setDC(d,c,e.target.value)} className="li" placeholder="0"/></div>)}
            <div className="lc lt">{N(rt)}</div>
          </React.Fragment>;
        })}
        <div className="lc lt" style={{textAlign:"left",paddingLeft:8,fontWeight:700,fontSize:".73rem"}}>DAY TOTAL</div>
        {DAYS.map(d=><div key={d} className="lc lt">{N(dt[d])}</div>)}
        <div className="lc" style={{background:"var(--accent)",color:"#fff",fontWeight:800,fontFamily:"var(--ff-m)"}}>{N(gt)}</div>
      </div></div></div>
    <div className="card"><div className="ct">Weekly Settlement</div><div className="kg">
      <div className="kpi" style={{borderLeftColor:"var(--accent)"}}><div className="kl">Grand Total</div><div className="kv">{N(gt)}</div></div>
      <div className="kpi" style={{borderLeftColor:"var(--green)"}}><div className="kl">Teachers ({tc} × {N(rate)})</div><div className="kv" style={{color:"var(--green)"}}>{N(tp)}</div></div>
      <div className="kpi" style={{borderLeftColor:pr>=0?"var(--blue)":"var(--red)"}}><div className="kl">Proprietor</div><div className="kv" style={{color:pr>=0?"var(--blue)":"var(--red)"}}>{N(pr)}</div></div>
    </div>

    {!isA&&<p className="hint">Only Admin can close the week.</p>}
    </div>
    {(ctx.lessonWeeks||[]).length>0&&<div className="card"><div className="ct">Archives</div>
      <div className="tw"><table><thead><tr><th>Closed</th><th className="r">Total</th><th className="r">Teachers</th><th className="r">Per Teacher</th><th className="r">Proprietor</th></tr></thead>
      <tbody>{[...(ctx.lessonWeeks||[])].reverse().map(a=><tr key={a.wid}>
        <td>{fmtD(a.date)}</td><td className="my">{N(a.grandTotal)}</td><td className="my">{N(a.totalTeacherPay)}</td>
        <td className="my">{N(a.teacherRate)}</td><td className={a.proprietorShare>=0?"my":"mr"}>{N(a.proprietorShare)}</td>
      </tr>)}</tbody></table></div></div>}
  </div>;
}

function Dash(){
  const ctx=useApp();

function Acct(){

  const inc=ae.filter(e=>e.entry_type==="Income"&&!e.reversed);
  const exp=ae.filter(e=>e.entry_type==="Expense"&&!e.reversal_of);
  const ti=inc.reduce((s,e)=>s+e.amount,0);const te=exp.reduce((s,e)=>s+e.amount,0);const ns=ti-te;
  const pt=inc.filter(e=>e.is_prior_term).reduce((s,e)=>s+e.amount,0);
  const ci={};inc.forEach(e=>{ci[e.category]=(ci[e.category]||0)+e.amount});
  const ce={};exp.forEach(e=>{ce[e.category]=(ce[e.category]||0)+e.amount});
  const sAi=ae.filter(e=>e.section==="A"&&e.entry_type==="Income"&&!e.reversed).reduce((s,e)=>s+e.amount,0);
  const sAe=ae.filter(e=>e.section==="A"&&e.entry_type==="Expense"&&!e.reversal_of).reduce((s,e)=>s+e.amount,0);

  const payroll=(ctx.salaries||[]).reduce((s,x)=>s+(x.netPay||0),0);

  const tpStu=(ctx.categories||DEF_CATS).filter(c=>c!=="Outstanding/Backlog").reduce((s,c)=>s+(ctx.feeTargets?.[c]||0),0);
  const expRev=tStu*tpStu;const colR=expRev>0?((ti/expRev)*100).toFixed(1):0;
  const lt=(ctx.lessonWeeks||[]).reduce((s,w)=>s+w.grandTotal,0);

      <div className="kpi" style={{borderLeftColor:"var(--red)"}}><div className="kl">Total Expenses</div><div className="kv" style={{color:"var(--red)"}}>{N(te)}</div></div>
      <div className="kpi" style={{borderLeftColor:ns>=0?"var(--blue)":"var(--red)"}}><div className="kl">Net Surplus/Deficit</div><div className="kv" style={{color:ns>=0?"var(--blue)":"var(--red)"}}>{N(ns)}</div></div>
      <div className="kpi" style={{borderLeftColor:"var(--accent)"}}><div className="kl">Collection Rate</div><div className="kv">{colR}%</div></div>
    </div></div>
    <div className="card"><div className="ct">Revenue by Category</div><div className="tw"><table><thead><tr><th>Category</th><th className="r">Amount</th><th className="r">%</th></tr></thead>
    <tbody>{Object.entries(ci).sort((a,b)=>b[1]-a[1]).map(([c,a])=><tr key={c}><td>{c}</td><td className="my">{N(a)}</td><td className="my">{ti>0?(a/ti*100).toFixed(1)+"%":"0%"}</td></tr>)}
    <tr style={{fontWeight:700,background:"var(--bg2)"}}><td>TOTAL</td><td className="my">{N(ti)}</td><td className="my">100%</td></tr>
    </tbody></table></div></div>
    <div className="card"><div className="ct">Expenses</div>{Object.keys(ce).length>0?<div className="tw"><table><thead><tr><th>Category</th><th className="r">Amount</th></tr></thead>
    <tbody>{Object.entries(ce).sort((a,b)=>b[1]-a[1]).map(([c,a])=><tr key={c}><td>{c}</td><td className="mr">{N(a)}</td></tr>)}<tr style={{fontWeight:700,background:"var(--bg2)"}}><td>TOTAL</td><td className="mr">{N(te)}</td></tr></tbody></table></div>:<p className="hint">No expenses recorded.</p>}</div>
    <div className="card"><div className="ct">Section A vs B</div><div className="tw"><table><thead><tr><th>Section</th><th className="r">Income</th><th className="r">Expense</th><th className="r">Net</th></tr></thead>
    <tbody>

      <tr><td>B — Middle & Senior</td><td className="my">{N(sBi)}</td><td className="mr">{N(sBe)}</td><td className={sBi-sBe>=0?"my":"mr"}>{N(sBi-sBe)}</td></tr>
    </tbody></table></div></div>
    <div className="card"><div className="ct">Lesson Income (Separate)</div><div className="kg">
      <div className="kpi" style={{borderLeftColor:"var(--accent)"}}><div className="kl">Lesson Revenue</div><div className="kv">{N(lt)}</div></div>
      <div className="kpi" style={{borderLeftColor:"var(--green)"}}><div className="kl">Teachers Paid</div><div className="kv">{N(ltch)}</div></div>

    </div></div>
    <div className="card"><div className="ct">Payroll & Special Items</div><div className="tw"><table><thead><tr><th>Item</th><th className="r">Amount</th></tr></thead>
    <tbody>
      <tr><td>Staff Payroll</td><td className="mr">{N(payroll)}</td></tr>
      <tr><td>Direct to Proprietor</td><td className="my">{N(dtotal)}</td></tr>
      <tr><td>Scholarship/Mercy</td><td>{(ctx.scholarships||[]).length} students</td></tr>
      <tr><td>Current Term Revenue</td><td className="my">{N(ti-pt)}</td></tr>
      <tr><td>Prior Term Recovery</td><td className="my">{N(pt)}</td></tr>
    </tbody></table></div></div>
    <div className="card"><div className="ct">Expected vs Actual</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {[["Expected",expRev,"var(--bg2)","var(--ink)"],["Collected",ti,"var(--greenBg)","var(--green)"],["Gap",expRev-ti,expRev-ti>0?"var(--redBg)":"var(--greenBg)",expRev-ti>0?"var(--red)":"var(--green)"]].map(([l,v,bg,c])=>
        <div key={l} style={{flex:1,minWidth:160,padding:12,background:bg,borderRadius:5,textAlign:"center"}}><div className="flb">{l}</div><div style={{fontFamily:"var(--ff-m)",fontSize:"1.1rem",fontWeight:700,color:c,marginTop:3}}>{N(v)}</div></div>)}
    </div></div>
    <div className="card" style={{borderLeft:"4px solid var(--red)"}}><div className="ct">🛡️ Audit Integrity</div><div className="tw"><table><thead><tr><th>Check</th><th>Status</th><th>Detail</th></tr></thead>
    <tbody>
      <tr><td>Reversals</td><td>{revs>5?<span className="badge bdr">HIGH</span>:<span className="badge bdg">OK</span>}</td><td>{revs} reversal(s)</td></tr>
      <tr><td>Large Txns (&gt;₦500k)</td><td>{lgT>0?<span className="badge bdo">REVIEW</span>:<span className="badge bdg">OK</span>}</td><td>{lgT} flagged</td></tr>
      <tr><td>Unread Alerts</td><td><span className="badge bdb">{(ctx.notifs||[]).filter(n=>!n.read).length}</span></td><td>Pending review</td></tr>
    </tbody></table></div></div>
  </div>;
}

function Settings(){
  const ctx=useApp();
  const[nc,setNc]=useState("");const[msg,setMsg]=useState(null);
  const[dp,setDp]=useState({student:"",class_name:ALL_CLS[0],amount:""});
  const[sp,setSp]=useState({student:"",class_name:ALL_CLS[0],type:"Scholarship"});

  function addCat(){
    if(!nc.trim()||(ctx.categories||[]).includes(nc.trim()))return;
    const u=[...(ctx.categories||[]),nc.trim()];ctx.updCats(u);
    ctx.updTermCfg({...ctx.termCfg,activeCats:{...ctx.termCfg?.activeCats,[nc.trim()]:true}});
    setNc("");setMsg({t:0,m:`Added "${nc.trim()}"`});setTimeout(()=>setMsg(null),2e3);
  }
  function togCat(c){
    if(c==="Outstanding/Backlog"){setMsg({t:1,m:"Cannot disable."});setTimeout(()=>setMsg(null),2e3);return}
    ctx.updTermCfg({...ctx.termCfg,activeCats:{...ctx.termCfg?.activeCats,[c]:!ctx.termCfg?.activeCats?.[c]}});
  }
  function setTgt(c,v){ctx.updTargets({...ctx.feeTargets,[c]:parseFloat(v)||0})}
  async function addDP(){
    if(!dp.student.trim())return;
    await ctx.saveDP({did:uid(),...dp,amount:parseFloat(dp.amount)||0,date:today(),created_at:new Date().toISOString()});
    setDp({student:"",class_name:ALL_CLS[0],amount:""});setMsg({t:0,m:"Recorded."});setTimeout(()=>setMsg(null),2e3);
  }
  async function addSch(){
    if(!sp.student.trim())return;
    await ctx.saveSch({scid:uid(),...sp,date:today(),created_at:new Date().toISOString()});
    setSp({student:"",class_name:ALL_CLS[0],type:"Scholarship"});setMsg({t:0,m:"Recorded."});setTimeout(()=>setMsg(null),2e3);
  }

  return<div className="fi">
    <h2 style={{fontFamily:"var(--ff-d)",fontSize:"1.1rem",marginBottom:12}}>⚙️ Settings</h2>
    {msg&&<div className={msg.t?"me":"mo"}>{msg.m}</div>}
    <div className="card"><div className="ct">Term & Year</div><div className="fr">
      <div className="fl"><span className="flb">Term</span><select value={ctx.termCfg?.term||"Term 1"} onChange={e=>ctx.updTermCfg({...ctx.termCfg,term:e.target.value})} className="sel"><option>Term 1</option><option>Term 2</option><option>Term 3</option></select></div>
      <div className="fl"><span className="flb">Year</span><input value={ctx.termCfg?.year||""} onChange={e=>ctx.updTermCfg({...ctx.termCfg,year:e.target.value})} className="inp" style={{width:140}}/></div>
    </div></div>
    <div className="card"><div className="ct">Fee Categories & Targets</div>
      <p className="hint" style={{marginBottom:10}}>Target = amount payable per student per term. Toggle ON/OFF per term.</p>
      {(ctx.categories||DEF_CATS).map(c=><div key={c} style={{display:"flex",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--bg2)",gap:8}}>
        <span style={{flex:1,fontSize:".82rem"}}>{c}</span>
        <input type="number" value={ctx.feeTargets?.[c]||""} onChange={e=>setTgt(c,e.target.value)} className="inpm" placeholder="₦ Target" style={{width:110,padding:"3px 6px",fontSize:".72rem"}}/>
        <button onClick={()=>togCat(c)} className={ctx.termCfg?.activeCats?.[c]!==false?"ton":"tof"}>{ctx.termCfg?.activeCats?.[c]!==false?"ON":"OFF"}</button>
      </div>)}
      <div className="fr" style={{marginTop:10}}><input value={nc} onChange={e=>setNc(e.target.value)} className="inp" placeholder="New category name" style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&addCat()}/><button className="btn bp bs" onClick={addCat}>ADD</button></div>
    </div>
    <div className="card"><div className="ct">💼 Direct Payments (to Proprietor)</div>
      <p className="hint" style={{marginBottom:8}}>Parents who pay proprietor directly. Reflected in accounting.</p>
      <div className="fr">
        <div className="fl" style={{flex:2}}><span className="flb">Student</span><input value={dp.student} onChange={e=>setDp({...dp,student:e.target.value})} className="inp" placeholder="Name"/></div>
        <div className="fl" style={{flex:1}}><span className="flb">Class</span><select value={dp.class_name} onChange={e=>setDp({...dp,class_name:e.target.value})} className="sel">{ALL_CLS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fl"><span className="flb">Amount</span><input type="number" value={dp.amount} onChange={e=>setDp({...dp,amount:e.target.value})} className="inpm" placeholder="0" style={{width:110}}/></div>
        <button className="btn bp bs" onClick={addDP}>RECORD</button>
      </div>
      {(ctx.directPay||[]).length>0&&<div className="tw" style={{marginTop:8}}><table><thead><tr><th>Student</th><th>Class</th><th className="r">Amount</th><th>Date</th></tr></thead>
      <tbody>{(ctx.directPay||[]).map(d=><tr key={d.did}><td>{d.student}</td><td>{d.class_name}</td><td className="my">{N(d.amount)}</td><td>{fmtD(d.date)}</td></tr>)}</tbody></table></div>}
    </div>
    <div className="card"><div className="ct">🎓 Scholarship / Mercy</div>
      <div className="fr">
        <div className="fl" style={{flex:2}}><span className="flb">Student</span><input value={sp.student} onChange={e=>setSp({...sp,student:e.target.value})} className="inp" placeholder="Name"/></div>
        <div className="fl" style={{flex:1}}><span className="flb">Class</span><select value={sp.class_name} onChange={e=>setSp({...sp,class_name:e.target.value})} className="sel">{ALL_CLS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fl"><span className="flb">Type</span><select value={sp.type} onChange={e=>setSp({...sp,type:e.target.value})} className="sel"><option>Scholarship</option><option>Mercy of School</option></select></div>
        <button className="btn bp bs" onClick={addSch}>RECORD</button>
      </div>
      {(ctx.scholarships||[]).length>0&&<div className="tw" style={{marginTop:8}}><table><thead><tr><th>Student</th><th>Class</th><th>Type</th><th>Date</th></tr></thead>
      <tbody>{(ctx.scholarships||[]).map(s=><tr key={s.scid}><td>{s.student}</td><td>{s.class_name}</td><td><span className="badge bdo">{s.type}</span></td><td>{fmtD(s.date)}</td></tr>)}</tbody></table></div>}
    </div>
    <div className="card" style={{borderLeft:"4px solid var(--accent)"}}><div className="ct">🛡️ Audit Trail</div>
      <div className="tw" style={{maxHeight:280,overflowY:"auto"}}><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
      <tbody>{(ctx.auditLog||[]).slice(0,60).map(a=><tr key={a.aid}>
        <td className="mn">{new Date(a.time).toLocaleString()}</td>
        <td><span className="badge bdb">{a.user}</span></td>
        <td>{a.action}</td>
        <td style={{maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.details}</td>
      </tr>)}</tbody></table></div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById("root")).render(<Prov><App/></Prov>);
</script>
</body>
</html>
